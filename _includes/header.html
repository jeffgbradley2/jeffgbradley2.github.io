    <a href="{{ '/' | relative_url }}" class="site-logo">Jeff.dev</a>

    <nav class="nav-desktop">
      <a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">Home</a>
